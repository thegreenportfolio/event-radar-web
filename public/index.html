<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Event Radar – Search local events</title>
  <meta name="description" content="Event Radar helps you search events by city, category, keyword, and date. Save events you like and add them to your calendar." />
  <meta name="application-name" content="Event Radar">

  <!-- Safari / Favorites / App Icons -->
  <link rel="icon" type="image/png" href="./assets/icon.png">
  <link rel="apple-touch-icon" href="./assets/icon.png">
  <meta name="theme-color" content="#0f8f3a">

  <!-- App Store Smart Banner -->
  <meta name="apple-itunes-app" content="app-id=6781845897">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="radar-circle">
        <div class="radar-sweep"></div>
        <span class="dot dot-1"></span>
        <span class="dot dot-2"></span>
        <span class="dot dot-3"></span>
      </div>

      <h1>Event Radar</h1>
      <p>Search events by city, category, and date. Save the ones you like and add them to your calendar.</p>
    </section>
    
    <section class="search-card">
      <div class="grid">
        <label>
         Country
    <select id="countryCode">
  <option value="US">USA</option>
  <option value="CA">Canada</option>
  <option value="MX">Mexico</option>
    <option value="GB">United Kingdom</option>
    <option value="IE">Ireland</option>
  <option value="AU">Australia</option>
  <option value="AT">Austria</option>
  <option value="BE">Belgium</option>
  <option value="CH">Switzerland</option>
  <option value="CZ">Czech Republic</option>
  <option value="DE">Germany</option>
  <option value="DK">Denmark</option>
  <option value="ES">Spain</option>
  <option value="FI">Finland</option>
  <option value="FR">France</option>
  <option value="IT">Italy</option>
  <option value="NL">Netherlands</option>
  <option value="NO">Norway</option>
  <option value="NZ">New Zealand</option>
  <option value="PL">Poland</option>
  <option value="PT">Portugal</option>
  <option value="RO">Romania</option>
  <option value="SE">Sweden</option>
  <option value="SG">Singapore</option>
  <option value="ZA">South Africa</option>
  <option value="AE">United Arab Emirates</option>
</select>
</label>

        <label>
    City
    <select id="city"></select>
    </label>

        <label>
  Category
  <select id="category">
    <option value="all">All Events</option>
    <option value="concerts">Concerts</option>
    <option value="sports">Sports</option>
    <option value="arts">Arts</option>
    <option value="festivals">Festivals & Community</option>
    <option value="business">Business</option>
  </select>
</label>

        <label>
          Keyword
          <input id="keyword" placeholder="Optional" />
        </label>

        <label>
          Start Date
          <input id="startDate" type="date" />
        </label>

        <label>
          End Date
          <input id="endDate" type="date" />
        </label>
      </div>

      <button id="searchButton">Search Events</button>
    </section>

    <section>
  <div class="section-header">
    <h2>Results</h2>
    <span id="resultCount">0 events</span>
  </div>
  <div id="results" class="event-list"></div>
</section>

<section id="appBanner" class="app-banner-container"></section>

<section>
  <div class="section-header">
    <h2>Saved Events</h2>
        <button id="clearSavedButton" class="secondary-button">Clear Saved</button>
      </div>
      <div id="savedEvents" class="event-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
